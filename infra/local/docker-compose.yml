services:
  postgres:
    image: postgres:15-alpine
    container_name: canvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvas
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: canvas
    ports:
      - "5432:5432"
    volumes:
      - canvas-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas -d canvas"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: canvas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
  minio:
    image: minio/minio:latest
    container_name: canvas-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - canvas-minio-data:/data
  minio-init:
    image: minio/mc:latest
    container_name: canvas-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        mc mb --ignore-existing local/canvas-raw

volumes:
  canvas-postgres-data:
  canvas-minio-data:
